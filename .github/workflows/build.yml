name: Build AutoHub APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Calculate version number
        id: version
        run: |
          # Offset so next build = v2 (run_number 16 - 14 = 2)
          VERSION=$(( ${{ github.run_number }} - 14 ))
          echo "num=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-arm64-v8a-debug.apk app/build/outputs/apk/debug/autohub-v${{ steps.version.outputs.num }}.apk

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autohub-v${{ steps.version.outputs.num }}
          path: app/build/outputs/apk/debug/autohub-v${{ steps.version.outputs.num }}.apk

      - name: Upload APK to Google Drive
        env:
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
        run: |
          curl -sO https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb
          rclone copy app/build/outputs/apk/debug/autohub-v${{ steps.version.outputs.num }}.apk gdrive:autohub/autohub-v${{ steps.version.outputs.num }}/ --verbose
