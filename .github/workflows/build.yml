name: Build AutoHub APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoHub-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload APK to Google Drive
        env:
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
        run: |
          curl -sO https://downloads.rclone.org/current/rclone-current-linux-amd64.zip
          unzip -q rclone-current-linux-amd64.zip
          ./rclone-*/rclone copy app/build/outputs/apk/debug/ gdrive:autohub/ --verbose
          echo "✅ APK uploaded to Google Drive: MyDrive/autohub/"
